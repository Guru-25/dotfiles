# General
fullscreen=yes
keep-open=yes

# OSD
osd-bar=no

# Screenshot
screenshot-sw=yes
screenshot-format=png
screenshot-png-compression=1
screenshot-directory="~/Pictures"
screenshot-template="%F-%p-%n"

# Priority
alang=tam,ta,eng,en
slang=eng,en

# Video
vo=gpu-next
gpu-api=vulkan
hwdec=auto

# Audio
volume-max=100

# Subs
sub-auto=fuzzy

# Streaming
script-opts=ytdl_hook-ytdl_path=/home/guru/.local/bin/yt-dlp
ytdl-format=bv+ba/b
ytdl-raw-options=sub-langs=en,write-subs=,write-auto-subs=,cookies-from-browser=brave

# Auto-Profiles
[extension.webm]
loop-file=inf
